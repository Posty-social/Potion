<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Potion">
  <defs>
    <linearGradient id="tile" x1="64" y1="32" x2="448" y2="480" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7e5891" />
      <stop offset="1" stop-color="#573869" />
    </linearGradient>
    <linearGradient id="liquid" x1="256" y1="300" x2="256" y2="452" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2b9490" />
      <stop offset="1" stop-color="#1c706e" />
    </linearGradient>
    <clipPath id="flask">
      <rect x="210" y="110" width="92" height="24" rx="12" />
      <rect x="224" y="118" width="64" height="132" />
      <circle cx="256" cy="332" r="120" />
    </clipPath>
  </defs>

  <!-- brand tile -->
  <rect width="512" height="512" rx="116" fill="url(#tile)" />

  <!-- glass flask -->
  <g fill="#ffffff">
    <rect x="210" y="110" width="92" height="24" rx="12" />
    <rect x="224" y="118" width="64" height="132" />
    <circle cx="256" cy="332" r="120" />
  </g>

  <!-- potion inside the flask -->
  <g clip-path="url(#flask)">
    <rect x="128" y="312" width="256" height="180" fill="url(#liquid)" />
    <ellipse cx="256" cy="312" rx="120" ry="14" fill="#57b3ae" />
    <circle cx="228" cy="360" r="11" fill="#c7ece8" opacity="0.85" />
    <circle cx="289" cy="398" r="8" fill="#c7ece8" opacity="0.8" />
    <circle cx="248" cy="420" r="6.5" fill="#c7ece8" opacity="0.75" />
    <!-- reflection streak on the glass -->
    <rect x="180" y="268" width="18" height="150" rx="9" fill="#ffffff" opacity="0.28" transform="rotate(-10 189 343)" />
  </g>
</svg>
